name: Check for Epic free games

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      trigger_source:
        description: 'What triggered this'
        required: false

permissions:
  contents: write

jobs:
  check-epic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python watcher.py

      - name: Commit updated seen_games.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add seen_games.json
          git diff --staged --quiet || git commit -m "Update seen games"
          git push
